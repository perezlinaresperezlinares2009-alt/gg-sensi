<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sensi Elite</title>

<style>
body {
  background: #0b1320;
  font-family: Arial;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.botones {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

button {
  padding: 20px;
  border-radius: 15px;
  border: none;
  background: #1c2a44;
  color: white;
  font-size: 16px;
}

/* PANEL */
.panel {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: #111;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.panel.activo {
  bottom: 0;
}
</style>
</head>

<body>

<h1>SENSI ELITE 🔥</h1>

<div class="botones">
  <button onclick="abrirPanel('freestyle')">Sensi Freestyle</button>
  <button onclick="abrirPanel('suprema')">Sensi Suprema</button>
  <button onclick="abrirPanel('lgang')">Sensibilidad L-Gang</button>
  <button onclick="abrirPanel('panel')">Sensi Panel</button>
</div>

<!-- PANEL -->
<div id="panel" class="panel">
  <div id="contenido"></div>
</div>

<script>
const panel = document.getElementById("panel");
const contenido = document.getElementById("contenido");

// ABRIR PANEL
function abrirPanel(tipo) {
  panel.classList.add("activo");

  if (tipo === "freestyle") {
    contenido.innerHTML = `
      <h2>🔥 Freestyle Insano</h2>
      General: 100<br>
      Punto Rojo: 95<br>
      Mira 2x: 90<br>
      AWM: 70
    `;
  }

  if (tipo === "suprema") {
    contenido.innerHTML = `
      <h2>⚡ Suprema Demoníaca</h2>
      General: 98<br>
      Punto Rojo: 92<br>
      Mira 2x: 85<br>
      AWM: 65
    `;
  }

  if (tipo === "lgang") {
    contenido.innerHTML = `
      <h2>💀 L-Gang Pro Max</h2>
      General: 100<br>
      Punto Rojo: 100<br>
      Mira 2x: 95<br>
      AWM: 75
    `;
  }

  if (tipo === "panel") {
    contenido.innerHTML = `
      <h2>🎯 Panel Destructor</h2>
      HUD: 70%<br>
      Botón disparo: 60%<br>
      DPI recomendado: 600
    `;
  }
}

// CERRAR AL TOCAR FUERA
document.addEventListener("click", function(e) {
  if (!panel.contains(e.target) && !e.target.closest("button")) {
    panel.classList.remove("activo");
  }
});
</script>

</body>
</html>
