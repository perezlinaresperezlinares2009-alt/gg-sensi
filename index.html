<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sensi Elite</title>

<style>
body {
  margin: 0;
  background: #0b1320;
  font-family: Arial;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

.botones {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 20px;
}

button {
  padding: 18px;
  border-radius: 15px;
  border: none;
  background: #1c2a44;
  color: white;
  font-size: 14px;
}

/* PANEL ABAJO */
.resultado {
  margin: 20px;
  padding: 20px;
  background: #16223a;
  border-radius: 15px;
  transition: 0.3s;
}
</style>
</head>

<body>

<h1>SENSI ELITE 🔥</h1>

<div class="botones">
  <button onclick="mostrar('dragon')">🐉 Dragon Headshot</button>
  <button onclick="mostrar('demon')">😈 Demon Aimlock</button>
  <button onclick="mostrar('ghost')">👻 Ghost Precision</button>
  <button onclick="mostrar('toxic')">☠️ Toxic Destroyer</button>

  <button onclick="mostrar('freestyle')">🔥 Sensi Freestyle</button>
  <button onclick="mostrar('suprema')">⚡ Sensi Suprema</button>
  <button onclick="mostrar('lgang')">💀 Sensibilidad L-Gang</button>
  <button onclick="mostrar('panel')">🎯 Sensi Panel</button>
</div>

<!-- RESULTADO ABAJO -->
<div id="resultado" class="resultado">
  <h2>🔥 Panel</h2>
  <p>Config aquí...</p>
</div>

<script>
const resultado = document.getElementById("resultado");

function mostrar(tipo) {

  if (tipo === "dragon") {
    resultado.innerHTML = `
      <h2>🐉 Dragon Headshot</h2>
      General: 100<br>
      Punto Rojo: 100<br>
      Mira 2x: 95<br>
      AWM: 80
    `;
  }

  if (tipo === "demon") {
    resultado.innerHTML = `
      <h2>😈 Demon Aimlock</h2>
      General: 99<br>
      Punto Rojo: 95<br>
      Mira 2x: 90<br>
      AWM: 75
    `;
  }

  if (tipo === "ghost") {
    resultado.innerHTML = `
      <h2>👻 Ghost Precision</h2>
      General: 97<br>
      Punto Rojo: 93<br>
      Mira 2x: 88<br>
      AWM: 70
    `;
  }

  if (tipo === "toxic") {
    resultado.innerHTML = `
      <h2>☠️ Toxic Destroyer</h2>
      General: 100<br>
      Punto Rojo: 98<br>
      Mira 2x: 92<br>
      AWM: 78
    `;
  }

  if (tipo === "freestyle") {
    resultado.innerHTML = `
      <h2>🔥 Freestyle Insano</h2>
      General: 100<br>
      Punto Rojo: 95<br>
      Mira 2x: 90<br>
      AWM: 70
    `;
  }

  if (tipo === "suprema") {
    resultado.innerHTML = `
      <h2>⚡ Suprema Demoníaca</h2>
      General: 98<br>
      Punto Rojo: 92<br>
      Mira 2x: 85<br>
      AWM: 65
    `;
  }

  if (tipo === "lgang") {
    resultado.innerHTML = `
      <h2>💀 L-Gang Pro Max</h2>
      General: 100<br>
      Punto Rojo: 100<br>
      Mira 2x: 95<br>
      AWM: 75
    `;
  }

  if (tipo === "panel") {
    resultado.innerHTML = `
      <h2>🎯 Panel Destructor</h2>
      HUD: 70%<br>
      Botón disparo: 60%<br>
      DPI recomendado: 600
    `;
  }
}
</script>

</body>
</html>
