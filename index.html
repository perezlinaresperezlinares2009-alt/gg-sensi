<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GG SENSI</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:linear-gradient(#071421,#0a2a3f);
    color:white;
    text-align:center;
}

h1{margin-top:20px;}

.menu{
    display:flex;
    justify-content:center;
    gap:10px;
    margin:15px;
}

.menu button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#1e2d3d;
    color:white;
}

.box{
    display:none;
}

.activo{
    display:block;
}

.sensi-btn{
    margin:10px;
    padding:15px;
    background:#1e2d3d;
    border-radius:12px;
    cursor:pointer;
}

.panel{
    background:#0e2233;
    margin:20px;
    padding:15px;
    border-radius:15px;
}

input[type=range]{
    width:80%;
}

button.guardar{
    margin-top:15px;
    padding:12px;
    width:80%;
    border:none;
    border-radius:10px;
    background:linear-gradient(90deg,#00e0b8,#00bcd4);
    color:black;
    font-weight:bold;
}
</style>

</head>
<body>

<h1>GG SENSI 🔥</h1>

<div class="menu">
    <button onclick="mostrar('tops')">🔥 Tops</button>
    <button onclick="mostrar('guardados')">💾 Guardados</button>
    <button onclick="abrirVIP()">👑 VIP</button>
</div>

<!-- TOPS -->
<div id="tops" class="box activo">
    <div class="sensi-btn" onclick="cargar('brasil')">🇧🇷 Sensi Brasileña</div>
    <div class="sensi-btn" onclick="cargar('temu')">😈 White Temu</div>
</div>

<!-- VIP -->
<div id="vip" class="box">
    <div class="sensi-btn" onclick="cargar('lgang')">🔥 L-Gang Pro</div>
    <div class="sensi-btn" onclick="cargar('white')">⚪ White 444</div>
    <div class="sensi-btn" onclick="cargar('hector')">👑 Mr Hector</div>
</div>

<!-- GUARDADOS -->
<div id="guardados" class="box">
    <h3>Guardados</h3>
    <div id="listaGuardados"></div>
</div>

<!-- PANEL -->
<div class="panel">
    <p>General <span id="gVal">100</span></p>
    <input type="range" id="general" min="0" max="200">

    <p>Punto rojo <span id="rVal">100</span></p>
    <input type="range" id="rojo" min="0" max="200">

    <p>Mira 2x <span id="m2Val">100</span></p>
    <input type="range" id="m2" min="0" max="200">

    <p>Mira 4x <span id="m4Val">100</span></p>
    <input type="range" id="m4" min="0" max="200">

    <p>Mira Franco <span id="mfVal">100</span></p>
    <input type="range" id="mf" min="0" max="200">

    <p>Cámara Libre <span id="cVal">100</span></p>
    <input type="range" id="camara" min="0" max="200">

    <button class="guardar" onclick="guardar()">Guardar</button>
</div>

<script>

let vipActivo = false;

function mostrar(id){
    document.querySelectorAll('.box').forEach(e=>e.classList.remove('activo'));
    document.getElementById(id).classList.add('activo');
}

function abrirVIP(){
    let pass = prompt("Contraseña VIP:");
    if(pass==="44400978"){
        vipActivo=true;
        mostrar('vip');
    }else{
        alert("Contraseña incorrecta");
    }
}

// SENSIS
function cargar(tipo){
    let data = {
        brasil:[195,173,158,190,22,84],
        temu:[198,180,164,184,200,200],
        lgang:[175,86,171,165,158,174],
        white:[156,133,60,118,31,144],
        hector:[100,100,100,100,100,100]
    };

    let s = data[tipo];

    document.getElementById("general").value=s[0];
    document.getElementById("rojo").value=s[1];
    document.getElementById("m2").value=s[2];
    document.getElementById("m4").value=s[3];
    document.getElementById("mf").value=s[4];
    document.getElementById("camara").value=s[5];

    actualizar();
}

// ACTUALIZAR TEXTO
document.querySelectorAll("input").forEach(i=>{
    i.addEventListener("input", actualizar);
});

function actualizar(){
    gVal.innerText=general.value;
    rVal.innerText=rojo.value;
    m2Val.innerText=m2.value;
    m4Val.innerText=m4.value;
    mfVal.innerText=mf.value;
    cVal.innerText=camara.value;
}

// GUARDAR
function guardar(){
    let datos = `
    General: ${general.value} |
    Rojo: ${rojo.value} |
    2x: ${m2.value} |
    4x: ${m4.value}
    `;

    let div = document.createElement("div");
    div.className="sensi-btn";
    div.innerText=datos;

    document.getElementById("listaGuardados").appendChild(div);
}

</script>

</body>
        </html>
