<!DOCTYPE html>

<title>GG SENSI</title>

<style>
body{
    margin:0;

}

.header{
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

.tabs{
    display:flex;

    padding:10px;
}

.tab{
    padding:8px 15px;
    border-radius:20px;

}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.btn{
    background:#1c2b3a;
    padding:15px;
    border-radius:15px;
    text-align:center;
}

/* PANEL */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#000a;
    display:none;
    justify-content:center;
    align-items:center;
}

.panel{
    width:90%;
    max-width:400px;
    background:#0f2233;
    padding:20px;
    border-radius:20px;
}

input{
    width:100%;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#19a7ce;
    color:white;
}
</style>
</head>
